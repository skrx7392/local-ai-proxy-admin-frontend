version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # @types/node must track the runtime. The runtime is Node 22 LTS.
    # When the runtime moves (see the Dockerfile ignore below), widen
    # this range in the same PR.
    ignore:
      - dependency-name: "@types/node"
        versions: [">=25"]
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      chakra-emotion:
        patterns:
          - "@chakra-ui/*"
          - "@emotion/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      testing:
        patterns:
          - vitest
          - "@vitest/*"
          - "@testing-library/*"
          - "@playwright/test"
          - jsdom

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: /deploy
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    # Pin the node base image to an LTS line. 22 is current LTS; 24 is
    # also LTS but we haven't validated it yet. Odd-numbered releases
    # (25, 27, ...) are non-LTS — reject them outright.
    ignore:
      - dependency-name: "node"
        versions: [">=25"]
