name: Deploy admin-frontend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-admin-frontend
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      # Pin checkout to the SHA whose CI passed. Without `ref`, workflow_run
      # resolves to main's current HEAD — a fast follow-up push would deploy
      # untested code under the previous SHA's label.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute image metadata
        id: meta
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "short_sha=${HEAD_SHA:0:12}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # Build the image on the clean runner (the exact tested SHA) and push to
      # GHCR. This replaces the old "scp source to the dev server and build
      # there" flow, where `scp` never deleted removed files — a deleted
      # `src/app/page.tsx` lingered and shadowed the real dashboard route.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.short_sha }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.short_sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to k3s
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SERVER_SSH_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          IMAGE: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.short_sha }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          DEV=sk@100.108.60.90
          SSH="ssh -o StrictHostKeyChecking=no $DEV"

          # Ensure namespace exists before creating the secret.
          $SSH "export KUBECONFIG=/home/sk/.kube/config && \
            sudo kubectl create namespace local-ai-admin --dry-run=client -o yaml | sudo kubectl apply -f -"

          # Create/update k8s secret from repo secrets.
          $SSH "export KUBECONFIG=/home/sk/.kube/config && \
            sudo kubectl -n local-ai-admin create secret generic admin-frontend-secret \
              --from-literal=AUTH_SECRET='${AUTH_SECRET}' \
              --dry-run=client -o yaml | sudo kubectl apply -f -"

          # Apply manifests by piping the runner's checked-out files over stdin
          # (they no longer live on the dev server). Glob only the files that
          # exist and prefix each with a `---` document separator so the stream
          # is valid multi-document YAML. A plain `cat` of the files concatenates
          # them into a single document (duplicate top-level keys, last wins) so
          # kubectl applies only the final manifest. Then pin the freshly pushed
          # image by its SHA tag and wait for the rollout.
          for f in deploy/k8s/*.yaml; do printf '%s\n' '---'; cat "$f"; done \
            | $SSH "export KUBECONFIG=/home/sk/.kube/config && sudo kubectl apply -f -"

          $SSH "export KUBECONFIG=/home/sk/.kube/config && \
            sudo kubectl -n local-ai-admin set image deployment/admin-frontend admin-frontend='${IMAGE}' && \
            sudo kubectl -n local-ai-admin rollout status deployment/admin-frontend --timeout=180s"
